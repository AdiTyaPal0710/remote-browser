<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLD Remote Browser</title>
    <meta name="description"
        content="Remote browser control system — stream and interact with a headless Chromium instance from your browser.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0f19;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.35);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --radius: 12px;
            --viewport-w: 1280;
            --viewport-h: 720;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ─────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.3px;
            white-space: nowrap;
            user-select: none;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s infinite;
        }

        .status-dot.connecting {
            background: var(--yellow);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* URL bar */
        .url-group {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .url-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .url-group svg {
            margin-left: 10px;
            flex-shrink: 0;
            opacity: 0.4;
        }

        #urlBar {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            padding: 8px 10px;
        }

        #urlBar::placeholder {
            color: var(--text-dim);
        }

        .url-go {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px 10px;
            transition: color 0.2s;
        }

        .url-go:hover {
            color: var(--accent);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Viewport Area ───────────────────────── */
        .viewport-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }

        .viewport-container {
            position: relative;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), 0 0 1px rgba(255, 255, 255, 0.1);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16/9;
        }

        #screen {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: default;
        }

        /* Placeholder / loading state */
        .viewport-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            z-index: 2;
            transition: opacity 0.4s;
        }

        .viewport-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .placeholder-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
        }

        .placeholder-text {
            font-size: 14px;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.6;
        }

        .placeholder-text strong {
            color: var(--text);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ── Status Bar ──────────────────────────── */
        .status-bar {
            padding: 6px 20px;
            font-size: 11px;
            color: var(--text-dim);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="brand">
            <div class="brand-icon">🌐</div>
            <span>BLD Remote Browser</span>
        </div>
        <div class="status-dot" id="statusDot" title="Disconnected"></div>
        <div class="divider"></div>

        <div class="url-group">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
            </svg>
            <input type="text" id="urlBar" placeholder="Enter URL and press Enter..." disabled />
            <button class="url-go" id="urlGo" title="Navigate" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </button>
        </div>
        <div class="divider"></div>

        <button class="btn btn-primary" id="startBtn" onclick="startBrowser()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            Start Browser
        </button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopBrowser()" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2" />
            </svg>
            Stop
        </button>
    </div>

    <!-- Viewport -->
    <div class="viewport-wrapper">
        <div class="viewport-container" id="viewportContainer">
            <img id="screen" alt="Remote Browser" />
            <div class="viewport-placeholder" id="placeholder">
                <div class="placeholder-icon" id="placeholderIcon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" />
                        <path d="M8 21h8" />
                        <path d="M12 17v4" />
                    </svg>
                </div>
                <div class="placeholder-text" id="placeholderText">
                    <strong>No browser running</strong><br>
                    Click <strong>Start Browser</strong> to launch a remote Chromium instance.
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span id="statusText">Ready</span>
        <span id="fpsText"></span>
    </div>

    <script>
        // ── Elements ────────────────────────────────
        const screen = document.getElementById('screen');
        const urlBar = document.getElementById('urlBar');
        const urlGo = document.getElementById('urlGo');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const fpsText = document.getElementById('fpsText');
        const placeholder = document.getElementById('placeholder');
        const placeholderIcon = document.getElementById('placeholderIcon');
        const placeholderText = document.getElementById('placeholderText');

        const VIEWPORT_W = 1280;
        const VIEWPORT_H = 720;

        let ws = null;
        let viewportFocused = false;
        let frameCount = 0;
        let lastFpsTime = Date.now();

        // FPS counter
        setInterval(() => {
            const now = Date.now();
            const elapsed = (now - lastFpsTime) / 1000;
            if (elapsed > 0) fpsText.textContent = `${Math.round(frameCount / elapsed)} FPS`;
            frameCount = 0;
            lastFpsTime = now;
        }, 1000);

        // ── State Management ────────────────────────
        function setState(state, msg) {
            statusText.textContent = msg || state;
            statusDot.className = 'status-dot';
            statusDot.title = state;

            if (state === 'connected') {
                statusDot.classList.add('connected');
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-flex';
                urlBar.disabled = false;
                urlGo.disabled = false;
                placeholder.classList.add('hidden');
            } else if (state === 'connecting' || state === 'starting') {
                statusDot.classList.add('connecting');
                startBtn.disabled = true;
                startBtn.innerHTML = '<span class="spinner"></span> Starting...';
                placeholder.classList.remove('hidden');
                placeholderIcon.innerHTML = '<div class="loading-spinner"></div>';
                placeholderText.innerHTML = state === 'starting'
                    ? '<strong>Starting container...</strong><br>Building image & launching Chromium.'
                    : '<strong>Connecting...</strong><br>Waiting for browser engine.';
            } else if (state === 'disconnected') {
                startBtn.style.display = 'inline-flex';
                startBtn.disabled = false;
                startBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Reconnect';
                stopBtn.style.display = 'inline-flex';
                urlBar.disabled = true;
                urlGo.disabled = true;
                placeholder.classList.remove('hidden');
                placeholderIcon.innerHTML = '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>';
                placeholderText.innerHTML = '<strong>Connection lost</strong><br>Click Reconnect or Stop the container.';
            } else { // idle
                startBtn.style.display = 'inline-flex';
                startBtn.disabled = false;
                startBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start Browser';
                stopBtn.style.display = 'none';
                urlBar.disabled = true;
                urlBar.value = '';
                urlGo.disabled = true;
                placeholder.classList.remove('hidden');
                placeholderIcon.innerHTML = '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>';
                placeholderText.innerHTML = '<strong>No browser running</strong><br>Click <strong>Start Browser</strong> to launch a remote Chromium instance.';
            }
        }

        // ── API Calls ───────────────────────────────
        async function startBrowser() {
            setState('starting', 'Starting container...');
            try {
                const res = await fetch('/api/start', { method: 'POST' });
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Start failed');
                setState('connecting', 'Connecting to browser...');
                // Give the WS server inside the container a moment to boot
                setTimeout(() => connectWS(), 2000);
            } catch (err) {
                setState('idle', 'Start failed: ' + err.message);
            }
        }

        async function stopBrowser() {
            if (ws) { ws.close(); ws = null; }
            setState('starting', 'Stopping container...');
            try {
                await fetch('/api/stop', { method: 'POST' });
            } catch { }
            setState('idle', 'Ready');
        }

        // ── WebSocket ───────────────────────────────
        function connectWS(retries = 8) {
            if (ws) { ws.close(); ws = null; }
            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                console.log('WS connected');
                setState('connected', 'Connected to remote browser');
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'frame') {
                        screen.src = 'data:image/jpeg;base64,' + msg.data;
                        frameCount++;
                    } else if (msg.type === 'url') {
                        urlBar.value = msg.url;
                    }
                } catch {
                    // Legacy raw frame data fallback
                    screen.src = 'data:image/jpeg;base64,' + event.data;
                    frameCount++;
                }
            };

            ws.onerror = () => { };

            ws.onclose = () => {
                if (retries > 0 && statusDot.classList.contains('connecting')) {
                    setTimeout(() => connectWS(retries - 1), 1500);
                } else if (startBtn.style.display === 'none') {
                    // Was connected, now lost
                    setState('disconnected', 'Connection lost');
                }
            };
        }

        // ── URL Navigation ──────────────────────────
        function navigateTo() {
            let url = urlBar.value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            urlBar.value = url;
            if (ws?.readyState === 1) {
                ws.send(JSON.stringify({ action: 'navigate', url }));
            }
        }

        urlBar.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); navigateTo(); screen.focus(); }
            e.stopPropagation(); // Don't forward to remote browser
        });
        urlBar.addEventListener('keyup', (e) => e.stopPropagation());
        urlGo.addEventListener('click', () => { navigateTo(); screen.focus(); });

        // ── Input Forwarding ────────────────────────
        function getScaled(event) {
            const rect = screen.getBoundingClientRect();
            return {
                x: Math.round((event.clientX - rect.left) * (VIEWPORT_W / rect.width)),
                y: Math.round((event.clientY - rect.top) * (VIEWPORT_H / rect.height)),
            };
        }

        function send(obj) { if (ws?.readyState === 1) ws.send(JSON.stringify(obj)); }

        // Click
        screen.addEventListener('click', (e) => {
            const { x, y } = getScaled(e);
            send({ action: 'click', x, y });
            viewportFocused = true;
        });

        // Double-click
        screen.addEventListener('dblclick', (e) => {
            e.preventDefault();
            const { x, y } = getScaled(e);
            send({ action: 'dblclick', x, y });
        });

        // Right-click
        screen.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const { x, y } = getScaled(e);
            send({ action: 'click', x, y, button: 'right' });
        });

        // Mouse move (throttled to ~30fps)
        let lastMove = 0;
        screen.addEventListener('mousemove', (e) => {
            const now = Date.now();
            if (now - lastMove < 33) return;
            lastMove = now;
            const { x, y } = getScaled(e);
            send({ action: 'mousemove', x, y });
        });

        // Scroll
        screen.addEventListener('wheel', (e) => {
            e.preventDefault();
            send({ action: 'scroll', deltaX: e.deltaX, deltaY: e.deltaY });
        }, { passive: false });

        // Keyboard — only forward when viewport is focused
        screen.addEventListener('mousedown', () => { viewportFocused = true; });
        urlBar.addEventListener('focus', () => { viewportFocused = false; });

        document.addEventListener('keydown', (e) => {
            if (!viewportFocused) return;
            e.preventDefault();
            send({ action: 'keydown', key: e.key });
        });
        document.addEventListener('keyup', (e) => {
            if (!viewportFocused) return;
            e.preventDefault();
            send({ action: 'keyup', key: e.key });
        });

        // ── Init: check if container is already running ─
        (async () => {
            try {
                const res = await fetch('/api/status');
                const { running } = await res.json();
                if (running) {
                    setState('connecting', 'Reconnecting...');
                    connectWS();
                }
            } catch { }
        })();
    </script>
</body>

</html>
